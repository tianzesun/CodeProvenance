weights:
  ast: 0.45
  token: 0.15
  winnowing: 0.05
  gst: 0.05
  semantic: 0.15
  web: 0.0
  ai_detection: 0.0
  execution_cfg: 0.15
  tree_kernel: 0.15
  cfg: 0.05
baseline_correction:
  baselines:
    winnowing: 0.35
    ast: 0.25
    fingerprint: 0.3
    ngram: 0.2
    embedding: 0.25
precision_guard:
  enabled: true
  high_score_floor: 0.68
  extreme_score_floor: 0.85
  evidence_threshold: 0.4
  lexical_threshold: 0.45
  minimum_concrete_engines: 2
  minimum_concrete_engines_high_score: 1
  minimum_lexical_engines: 1
  minimum_lexical_engines_high_score: 0
  penalty_multiplier: 0.85
  semantic_only_cap: 0.45
  cfg_high_score_bypass: true
  ast_bypass_threshold: 0.85
arbitration:
  enabled: true
  prior_precision_multiplier: 20.0
  minimum_agreement: 0.3
ast_boost:
  enabled: true
  threshold: 0.80
  minimum_guaranteed_score: 0.65
  bypass_precision_guards: true
deep_verify:
  tree_kernel_min: 0.60
  ast_normalized_min: 0.45
  cfg_similarity_min: 0.50
  minimum_agreeing_engines: 3
  minimum_agreeing_engines_high_score: 2
  final_confidence_floor: 0.65
  false_positive_safety_cap: 0.58
  cfg_bypass_enabled: true
  cfg_bypass_threshold: 0.80
decision:
  default_threshold: 0.78
  minimum_confidence: 0.4
  minimum_engine_agreement: 2
  uncertainty_review_threshold: 0.75
  false_positive_bias: 1.5
  precision_target: 0.95

thresholds:
  identical: 0.85
  high_similarity: 0.80
  medium_similarity: 0.62
  low_similarity: 0.35
  auto_refer: 0.90
  embedding_match: 0.85
  minimum_reportable: 0.20
toggles:
  baseline_correction: true
  bayesian_arbitration: true
  ast_boost: true
  execution_similarity: true
  result_caching: true
performance:
  parallel_engine_execution: 4
  result_cache_ttl: 3600
  engine_timeout_ms: 15000
  maximum_batch_size: 256
advanced:
  auto_calibrate: true
  hot_reload: true
  reload_interval: 10
  benchmark_dataset: ir_plag
  auto_optimize_thresholds: true
  weights_need_validation: false
score_normalization:
  common_scale: similarity_probability_0_to_1
  external_tools:
    moss:
      method: percent
      range:
      - 0
      - 100
    jplag:
      method: percent
      range:
      - 0
      - 100
    dolos:
      method: percent
      range:
      - 0
      - 100
    nicad:
      method: percent
      range:
      - 0
      - 100
    sherlock:
      method: percent
      range:
      - 0
      - 100
    pmd:
      method: percent
      range:
      - 0
      - 100
  internal_engines:
    method: unit
    range:
    - 0
    - 1
  calibration_note: Normalization only aligns score scales. Probability calibration still requires labeled train/validation data per engine.
fusion_presets:
  algorithm_data_structure:
    id: algorithm_data_structure
    name: Algorithm/Data Structure
    description: Emphasizes structural evidence for assignments with shared boilerplate and common textbook patterns.
    weights:
      ast: 0.28
      tree_kernel: 0.20
      cfg: 0.16
      execution_cfg: 0.16
      token: 0.08
      winnowing: 0.06
      gst: 0.04
      semantic: 0.02
    evidence_surfaces:
    - ast_structure
    - control_flow
    - execution_behavior
    - token_overlap
    - hard_negative_context
    pipelines:
    - code
    present_results_separately: false
  open_ended_coding:
    id: open_ended_coding
    name: Open-ended Coding
    description: Balances lexical, structural, and semantic evidence for projects where implementations can legitimately differ.
    weights:
      ast: 0.22
      token: 0.14
      winnowing: 0.10
      gst: 0.10
      semantic: 0.20
      execution_cfg: 0.14
      tree_kernel: 0.06
      cfg: 0.04
    evidence_surfaces:
    - semantic_similarity
    - ast_structure
    - token_overlap
    - execution_behavior
    - side_by_side_diff
    pipelines:
    - code
    present_results_separately: false
  essay_report:
    id: essay_report
    name: Essay/Report
    description: Prioritizes text similarity and AI-writing evidence while suppressing code-only evidence surfaces.
    weights:
      semantic: 0.34
      web: 0.22
      ai_detection: 0.28
      token: 0.10
      winnowing: 0.06
    evidence_surfaces:
    - text_similarity
    - source_overlap
    - ai_detection
    - citation_context
    - false_positive_risk
    pipelines:
    - text
    present_results_separately: false
  mixed_submission:
    id: mixed_submission
    name: Mixed Submission
    description: Runs code and write-up pipelines independently and reports the evidence separately so one modality does not hide the other.
    weights:
      ast: 0.18
      token: 0.10
      winnowing: 0.08
      gst: 0.07
      semantic: 0.20
      web: 0.12
      ai_detection: 0.12
      execution_cfg: 0.08
      tree_kernel: 0.03
      cfg: 0.02
    evidence_surfaces:
    - code_similarity
    - text_similarity
    - ai_detection
    - side_by_side_diff
    - separate_pipeline_summary
    pipelines:
    - code
    - text
    present_results_separately: true
weight_governance:
  default_weight_changes_require_validation: true
  required_split: validation
  locked_test_set_policy: test split is used only for final published results
  required_evidence:
  - validation_run_id
  - benchmark_dataset_id
  - metric_snapshot
  allowed_roles:
  - admin
  - developer
  audit_log_required: true
