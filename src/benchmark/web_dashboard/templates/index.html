{% raw %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeProvenance Benchmark Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
        .header { background: var(--surface); padding: 1rem 2rem; border-bottom: 1px solid #334155; }
        .header h1 { font-size: 1.5rem; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        .card { background: var(--surface); border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; }
        .card h3 { color: var(--muted); font-size: 0.875rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .card .value { font-size: 2.5rem; font-weight: 700; }
        .card .sub { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }
        .chart-container { position: relative; height: 350px; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
        tr:hover { background: rgba(59, 130, 246, 0.1); }
        .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #064e3b; color: var(--success); }
        .badge-warning { background: #451a03; color: var(--warning); }
        .badge-danger { background: #450a0a; color: var(--danger); }
        .nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .nav button { background: var(--surface); color: var(--text); border: 1px solid #334155; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
        .nav button.active { background: var(--primary); border-color: var(--primary); }
        .nav button:hover:not(.active) { background: #334155; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 CodeProvenance Benchmark Dashboard</h1>
    </div>
    <div class="container">
        <div class="nav">
            <button class="active" onclick="showSection('overview')">📊 Comparison</button>
            <button onclick="showSection('details')">📋 All Reports</button>
            <button onclick="showSection('history')">📈 History</button>
        </div>

        <!-- Overview Section -->
        <div id="overview-section">
            <div class="grid" id="kpi-cards"></div>
            <div class="grid">
                <div class="card">
                    <h3>Metrics Comparison</h3>
                    <div class="chart-container"><canvas id="barChart"></canvas></div>
                </div>
                <div class="card">
                    <h3>Confusion Matrix (True/False Positives/Negatives)</h3>
                    <div class="chart-container"><canvas id="matrixChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- Details Section -->
        <div id="details-section" class="hidden">
            <div class="card">
                <h3>All Benchmark Reports</h3>
                <table>
                    <thead>
                        <tr><th>Timestamp</th><th>Engine</th><th>Precision</th><th>Recall</th><th>F1</th><th>Accuracy</th><th>Threshold</th></tr>
                    </thead>
                    <tbody id="reports-table"></tbody>
                </table>
            </div>
        </div>

        <!-- History Section -->
        <div id="history-section" class="hidden">
            <div class="card">
                <h3>Engine History</h3>
                <select id="engine-select" onchange="loadHistory(this.value)" style="background:var(--surface);color:var(--text);border:1px solid #334155;padding:0.5rem;border-radius:6px;margin-bottom:1rem;">
                    <option value="">Select engine...</option>
                </select>
                <div class="chart-container"><canvas id="historyChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let barChart, matrixChart, historyChart;
        const COLORS = {
            nicad: '#22c55e', codeprovenance: '#3b82f6', jplag: '#f59e0b',
            moss: '#8b5cf6', pmd: '#ef4444', hybrid: '#06b6d4', baseline: '#64748b'
        };
        function getColor(engine) { return COLORS[engine] || '#' + Math.floor(Math.random()*16777215).toString(16); }

        async function init() {
            const comp = await fetch('/api/comparison').then(r => r.json());
            const reports = await fetch('/api/reports').then(r => r.json());

            // Update engine select
            const select = document.getElementById('engine-select');
            [...new Set(comp.map(r => r.engine))].forEach(e => {
                const opt = document.createElement('option');
                opt.value = e; opt.textContent = e; select.appendChild(opt);
            });

            renderKPIs(comp);
            renderBarChart(comp);
            renderMatrixChart(comp);
            renderTable(reports);
        }

        function renderKPIs(comparison) {
            const container = document.getElementById('kpi-cards');
            // Best F1
            const best = comparison.reduce((a, b) => a.f1 > b.f1 ? a : b, comparison[0] || {f1:0, engine:'N/A'});
            const bestRecall = comparison.reduce((a, b) => a.recall > b.recall ? a : b, comparison[0] || {recall:0, engine:'N/A'});
            container.innerHTML = `
                <div class="card"><h3>Best F1 Score</h3><div class="value">${(best.f1*100).toFixed(1)}%</div><div class="sub">${best.engine}</div></div>
                <div class="card"><h3>Best Recall</h3><div class="value">${(bestRecall.recall*100).toFixed(1)}%</div><div class="sub">${bestRecall.engine}</div></div>
                <div class="card"><h3>Best Precision</h3><div class="value">${(comparison.reduce((a,b) => a.precision > b.precision ? a : b, comparison[0]||{precision:0}).precision*100).toFixed(1)}%</div><div class="sub">${comparison.reduce((a,b) => a.precision > b.precision ? a : b, comparison[0]||{precision:0}).engine}</div></div>
                <div class="card"><h3>Tools Compared</h3><div class="value">${comparison.length}</div><div class="sub">engines registered</div></div>
            `;
        }

        function renderBarChart(comparison) {
            const ctx = document.getElementById('barChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: comparison.map(r => r.engine),
                    datasets: [
                        { label: 'Precision', data: comparison.map(r => r.precision), backgroundColor: getColor(comparison[0]?.engine), },
                        { label: 'Recall', data: comparison.map(r => r.recall), },
                        { label: 'F1', data: comparison.map(r => r.f1), }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true, max: 1, ticks: { callback: v => (v*100)+'%' } } }
                }
            });
        }

        function renderMatrixChart(comparison) {
            const ctx = document.getElementById('matrixChart').getContext('2d');
            if (matrixChart) matrixChart.destroy();
            matrixChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: comparison.map(r => r.engine),
                    datasets: [
                        { label: 'True Positives', data: comparison.map(r => r.tp), backgroundColor: '#22c55e' },
                        { label: 'True Negatives', data: comparison.map(r => r.tn), backgroundColor: '#3b82f6' },
                        { label: 'False Positives', data: comparison.map(r => r.fp), backgroundColor: '#ef4444' },
                        { label: 'False Negatives', data: comparison.map(r => r.fn), backgroundColor: '#f59e0b' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
        }

        function renderTable(reports) {
            const tbody = document.getElementById('reports-table');
            tbody.innerHTML = reports.map(r => `
                <tr>
                    <td>${r.timestamp}</td><td><strong>${r.engine}</strong></td>
                    <td><span class="badge ${r.precision >= 0.9 ? 'badge-success' : r.precision >= 0.7 ? 'badge-warning' : 'badge-danger'}">${(r.precision*100).toFixed(1)}%</span></td>
                    <td><span class="badge ${r.recall >= 0.9 ? 'badge-success' : r.recall >= 0.7 ? 'badge-warning' : 'badge-danger'}">${(r.recall*100).toFixed(1)}%</span></td>
                    <td><span class="badge ${r.f1 >= 0.9 ? 'badge-success' : r.f1 >= 0.7 ? 'badge-warning' : 'badge-danger'}">${(r.f1*100).toFixed(1)}%</span></td>
                    <td>${(r.accuracy*100).toFixed(1)}%</td>
                    <td>${r.threshold}</td>
                </tr>
            `).join('');
        }

        async function loadHistory(engine) {
            if (!engine) return;
            const history = await fetch(`/api/history/${engine}`).then(r => r.json());
            const ctx = document.getElementById('historyChart').getContext('2d');
            if (historyChart) historyChart.destroy();
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(r => r.timestamp),
                    datasets: [
                        { label: 'Precision', data: history.map(r => r.precision), borderColor: '#3b82f6', fill: false },
                        { label: 'Recall', data: history.map(r => r.recall), borderColor: '#22c55e', fill: false },
                        { label: 'F1', data: history.map(r => r.f1), borderColor: '#f59e0b', fill: false }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true, max: 1, ticks: { callback: v => (v*100)+'%' } } }
                }
            });
        }

        function showSection(section) {
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('overview-section').classList.toggle('hidden', section !== 'overview');
            document.getElementById('details-section').classList.toggle('hidden', section !== 'details');
            document.getElementById('history-section').classList.toggle('hidden', section !== 'history');
        }

        init();
    </script>
</body>
</html>{% endraw %}
