## Benchmark Configuration - JPlag Engine
## Usage: python -m benchmark run --config config/benchmark_jplag.yaml

dataset:
  name: "synthetic"
  version: "1.0"
  generator:
    seed: 42
    language: "python"
    pair_counts:
      type1: 50
      type2: 50
      type3: 50
      type4: 50
      non_clone: 200

engine:
  name: "jplag"
  version: "6.3.0"

normalizer:
  type: "moss"

parser:
  type: "ast"
  max_ast_depth: 10

evaluation:
  mode: "pairwise"

metrics:
  metrics:
    - precision
    - recall
    - f1
    - accuracy
    - map
    - mrr

threshold:
  optimize: true
  strategy: "f1_max"

output:
  json: true
  html: true
  leaderboard: true