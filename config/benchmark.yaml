## Benchmark Configuration
## Usage: python -m benchmark run --config config/benchmark.yaml
##
## This file fully defines a single benchmark run:
##   dataset + engine + normalizer + parser + evaluation + metrics + threshold + output

dataset:
  name: "synthetic"            # Dataset name (synthetic, bigclonebench, google_codejam)
  version: "1.0"               # Dataset version (must be pinned)
  generator:
    seed: 42                   # Random seed for reproducibility
    language: "python"          # Programming language
    pair_counts:
      type1: 50                # Type-1: Identical clones
      type2: 50                # Type-2: Renamed identifiers
      type3: 50                # Type-3: Restructured code
      type4: 50                # Type-4: Semantic clones
      non_clone: 200           # Non-clone pairs (negative samples)

engine:
  name: "hybrid"               # Engine: token_winnowing, ast_structural, hybrid
  version: "1.0"               # Engine version (pinned for reproducibility)

normalizer:
  type: "moss"                 # Code normalizer: moss, jplag, none

parser:
  type: "ast"                  # Parser type: ast, token
  max_ast_depth: 10            # Maximum AST traversal depth

evaluation:
  mode: "pairwise"             # Mode: pairwise or ranking

metrics:
  metrics:
    - precision
    - recall
    - f1
    - accuracy
    - map
    - mrr

threshold:
  optimize: true               # Whether to optimize threshold
  strategy: "f1_max"           # Strategy: f1_max, precision_fixed, recall_fixed

output:
  json: true                   # Write JSON report
  html: true                   # Write HTML report
  leaderboard: true            # Update leaderboard