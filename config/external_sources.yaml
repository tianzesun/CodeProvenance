# ============================================================================
# GLOBAL SETTINGS
# ============================================================================

# Database storage for external sources
storage:
  # Use separate table for external code
  table_prefix: "external_"

  # Retention policy
  retention_days: 365 # Keep external code for 1 year

  # Compression
  compress: true

  # Deduplication
  deduplicate: true
  hash_algorithm: "sha256"

# Indexing
indexing:
  # Enable full-text search
  full_text_search: true

  # Enable code-specific indexing
  code_indexing: true

  # Languages to index
  languages:
    - python
    - java
    - javascript
    - typescript
    - c
    - cpp
    - go
    - rust
    - ruby
    - php
    - swift
    - kotlin
    - scala
    - r
    - matlab
    - julia
    - haskell
    - ocaml
    - perl
    - lua

# Matching
matching:
  # Minimum similarity threshold for external matches
  threshold: 0.7

  # Include external matches in reports
  include_in_reports: true

  # Show source attribution
  show_attribution: true

  # External match weight (0-1)
  weight: 0.8

# Notifications
notifications:
  # Notify when external match found
  on_external_match: true

  # Notification channels
  channels:
    - email
    - webhook

  # Batch notifications
  batch_threshold: 5 # Notify after 5 matches


