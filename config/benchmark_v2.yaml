## Benchmark Configuration v2
## Usage: python -m benchmark run --config config/benchmark_v2.yaml
##
## This configuration uses the new architecture with:
##   - Explicit pipeline phases
##   - Versioned engine registry
##   - Tiered reporting
##   - Forensics module

system:
  name: "CodeProvenance"
  version: "2.0"
  mode: "research"

pipeline:
  phases:
    - ingest
    - normalize
    - represent
    - compare
    - aggregate
    - evaluate
    - report

dataset:
  name: "synthetic"
  version: "1.0"
  generator:
    seed: 42
    language: "python"
    pair_counts:
      type1: 50
      type2: 50
      type3: 50
      type4: 50
      non_clone: 200

engines:
  - codeprovenance:v1
  - codeprovenance:v2
  - codeprovenance:v3

normalizer:
  type: "moss"

parser:
  type: "ast"
  max_ast_depth: 10

evaluation:
  mode: "pairwise"
  layers:
    - sensitivity
    - precision
    - generalization
  weights:
    sensitivity: 0.4
    precision: 0.3
    generalization: 0.3

metrics:
  metrics:
    - precision
    - recall
    - f1
    - accuracy
    - map
    - mrr

threshold:
  optimize: true
  strategy: "f1_max"

reporting:
  tiers:
    - scientific
    - operational
    - forensic
  visualizations:
    - heatmaps
    - ast_alignment
    - causal_graphs
    - distributions

forensics:
  enabled: true
  causal_analysis: true
  attribution: true
  clone_taxonomy: true

output:
  json: true
  html: true
  leaderboard: true
  latex: true
  visualizations: true